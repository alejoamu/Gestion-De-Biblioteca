# Keycloak para autenticación JWT del proyecto Biblioteca.
# Ejecutar desde la raíz del proyecto: docker-compose up -d
# Admin Console: http://localhost:8080 (usuario: admin, contraseña: admin)
# El realm "biblioteca" se importa automáticamente al iniciar (usuarios: admin, bibliotecario, lector; contraseña: password).

services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.2
    command:
      - "start-dev"
      - "--import-realm"
      - "--http-port=8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/realm-biblioteca.json:/opt/keycloak/data/import/realm-biblioteca.json
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q 'HTTP/1.1 200'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
